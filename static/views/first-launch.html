 <head>
    <link rel="stylesheet" href="./style.css" type="text/css" />

    <style>
        body {
            height: 100vh;
            padding: 1.5em;
            padding-bottom: 1em;
            border: 1px solid var(--fg-semi-trans);
            border-top: none;
            display: flex;
            flex-direction: column;
            box-sizing: border-box;
            background: #141414;
            color: #f5f5f5;
            font-family: 'Comic Sans MS', cursive, sans-serif;
            animation: skibidi 2s infinite alternate;
        }

        @keyframes skibidi {
            0% { transform: rotate(0); }
            100% { transform: rotate(5deg); }
        }

        select {
            background: #202020;
            color: #ff5555;
            padding: 0.3em;
            margin: -0.3em;
            border-radius: 6px;
            border: 2px solid #ff5555;
        }

        h1 {
            margin: 0.4em 0 0;
            font-size: 2.5em;
            color: #ff5555;
            text-shadow: 2px 2px #ffae00;
            text-align: center;
            animation: shake 0.5s infinite;
        }

        @keyframes shake {
            0% { transform: translate(1px, 1px) rotate(0deg); }
            10% { transform: translate(-1px, -2px) rotate(-1deg); }
            20% { transform: translate(-3px, 0px) rotate(1deg); }
            30% { transform: translate(3px, 2px) rotate(0deg); }
            40% { transform: translate(1px, -1px) rotate(1deg); }
            50% { transform: translate(-1px, 2px) rotate(-1deg); }
            60% { transform: translate(-3px, 1px) rotate(0deg); }
            70% { transform: translate(3px, 1px) rotate(-1deg); }
            80% { transform: translate(-1px, -1px) rotate(1deg); }
            90% { transform: translate(1px, 2px) rotate(0deg); }
            100% { transform: translate(1px, -2px) rotate(-1deg); }
        }

        p {
            margin: 1em 0 2em;
            font-size: 1.2em;
            text-align: center;
        }

        form {
            display: grid;
            gap: 1em;
            margin: 0;
        }

        label {
            position: relative;
            display: flex;
            justify-content: space-between;
        }

        label div {
            display: grid;
            gap: 0.2em;
        }

        label h2 {
            margin: 0;
            font-weight: normal;
            font-size: 1.3rem;
            line-height: 1rem;
            color: #ffae00;
        }

        label span {
            font-size: 0.9rem;
            font-weight: 400;
            color: #ff5555;
        }

        #buttons {
            display: flex;
            justify-content: end;
            gap: 0.5em;
            margin-top: auto;
        }

        button {
            padding: 0.6em;
            background: #ff5555;
            color: #f5f5f5;
            border-radius: 6px;
            border: none;
            cursor: pointer;
            transition: 200ms filter;
            font-size: 1.2em;
        }

        button:hover {
            filter: brightness(0.8);
        }

        #submit {
            background: #ffae00;
        }
    </style>
</head>

<body>
    <h1>Welcome to Skibiditop</h1>
    <p>Time to customize your ultimate Skibidi journey!</p>

    <form>
        <label>
            <h2>Discord Branch</h2>
            <select name="discordBranch">
                <option value="stable">stable</option>
                <option value="canary">canary</option>
                <option value="ptb">ptb</option>
            </select>
        </label>

        <label>
            <div>
                <h2>Start with System</h2>
                <span>Automatically open Skibiditop when your PC starts with a Skibidi Bop!</span>
            </div>
            <input type="checkbox" name="autoStart" />
        </label>

        <label>
            <div>
                <h2>Rich Presence</h2>
                <span
                    >Enable Rich Presence (show off your game domination!) via
                    <a href="https://github.com/OpenAsar/arrpc" target="_blank">arRPC</a></span
                >
            </div>
            <input type="checkbox" name="richPresence" checked />
        </label>

        <label>
            <div>
                <h2>Import Settings</h2>
                <span>Grab settings from your previous epic Vencord setup</span>
            </div>
            <input type="checkbox" name="importSettings" checked />
        </label>

        <label>
            <div>
                <h2>Minimise to Tray</h2>
                <span>Minimize to Tray when you skibidi your way out!</span>
            </div>
            <input type="checkbox" name="minimizeToTray" checked />
        </label>
    </form>
    <div id="buttons">
        <button id="cancel">Quit</button>
        <button id="submit">Skibidi!</button>
    </div>
</body>

<script>
    cancel.onclick = () => console.info("cancel");
    submit.onclick = e => {
        const form = document.querySelector("form");
        const formData = new FormData(form);
        const data = Object.fromEntries(formData.entries());
        console.info("form:" + JSON.stringify(data));
        e.preventDefault();
    };
</script>
